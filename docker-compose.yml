services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: incite
      POSTGRES_PASSWORD: incite
      POSTGRES_DB: incite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incite"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://incite:incite@db:5432/incite
      CHROMA_PERSIST_PATH: /app/chroma_data
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - chroma_data:/app/chroma_data
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
